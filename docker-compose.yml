services:

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: probhammer
      POSTGRES_USER: probhammer
      POSTGRES_PASSWORD: probhammer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    depends_on:
      - db
    # Lancement : docker compose up backend
    # API disponible sur http://localhost:8000
    # Docs interactives : http://localhost:8000/docs

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    volumes:
      - ./data:/app/data
      - ./frontend/public/data:/app/frontend/public/data
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    # Service one-shot : tourne une fois et s'arrête
    # Lancement : docker compose run --rm pipeline
    # Ou un script spécifique : docker compose run --rm pipeline python pipeline/parse_bsdata.py

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    # Le frontend lit les données depuis frontend/public/data/ au BUILD
    # Pour voir les données fraîches du pipeline : rebuild avec docker compose up --build frontend

volumes:
  postgres_data:
