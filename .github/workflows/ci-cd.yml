name: CI/CD ProbHammer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # Job 1 — CI : lint + build (tous les pushs)
  # ─────────────────────────────────────────────
  ci:
    name: CI — Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python lint ──────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Python (flake8)
        run: |
          pip install flake8 --quiet
          flake8 backend/ --max-line-length=120 --exclude=__pycache__

      # ── Frontend lint + build ────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2 — CD Frontend : S3 + CloudFront
  # Seulement sur push main (pas sur PR)
  # ─────────────────────────────────────────────
  cd-frontend:
    name: CD — Frontend (S3 + CloudFront)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Sync vers S3
        run: aws s3 sync frontend/dist/ s3://probhammer-frontend-prod --delete

      - name: Invalider le cache CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  # ─────────────────────────────────────────────
  # Job 3 — CD Pipeline BSData : ECR
  # Seulement sur push main (pas sur PR)
  # ─────────────────────────────────────────────
  cd-pipeline:
    name: CD — Pipeline BSData (ECR)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login ECR
        run: aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build + push image pipeline vers ECR
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/probhammer-pipeline:latest -t ${{ secrets.ECR_REGISTRY }}/probhammer-pipeline:${{ github.sha }} -f pipeline/Dockerfile .
          docker push ${{ secrets.ECR_REGISTRY }}/probhammer-pipeline:latest
          docker push ${{ secrets.ECR_REGISTRY }}/probhammer-pipeline:${{ github.sha }}

  # ─────────────────────────────────────────────
  # Job 4 — CD Backend : ECR + déploiement EC2
  # Seulement sur push main (pas sur PR)
  # ─────────────────────────────────────────────
  cd-backend:
    name: CD — Backend (ECR + EC2 via SSM)
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login ECR
        run: aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build + push image backend vers ECR
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/probhammer-backend:latest -t ${{ secrets.ECR_REGISTRY }}/probhammer-backend:${{ github.sha }} backend/
          docker push ${{ secrets.ECR_REGISTRY }}/probhammer-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/probhammer-backend:${{ github.sha }}

      - name: Déployer sur EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region eu-west-3 \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"/usr/local/bin/aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }} && docker pull ${{ secrets.ECR_REGISTRY }}/probhammer-backend:latest && docker stop probhammer-backend 2>/dev/null || true && docker rm probhammer-backend 2>/dev/null || true && docker run -d --name probhammer-backend --env-file /home/ubuntu/backend.env -p 8000:8000 --restart unless-stopped ${{ secrets.ECR_REGISTRY }}/probhammer-backend:latest\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --region eu-west-3

      - name: Vérifier que le backend répond
        run: |
          sleep 10
          curl --fail --silent --max-time 10 ${{ secrets.VITE_API_URL }}/health || \
            (echo "Backend health check failed" && exit 1)
