name: Sync BSData

on:
  schedule:
    - cron: "0 */12 * * *"   # toutes les 12h
  workflow_dispatch:           # déclenchable manuellement depuis GitHub Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch BSData
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/fetch_bsdata.py

      - name: Parse BSData
        run: python pipeline/parse_bsdata.py

      - name: Promote cache
        run: mkdir -p data/cache_stable && cp data/cache/*.json data/cache_stable/

      - name: Build frontend data
        run: python pipeline/build_frontend_data.py

      - name: Audit data quality
        run: python pipeline/audit.py

      - name: Commit frontend data (si changements)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/ data/version.json
          if git diff --cached --quiet; then
            echo "Aucun changement — BSData n'a pas été mis à jour."
          else
            git commit -m "chore: sync BSData [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
