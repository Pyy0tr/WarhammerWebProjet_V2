apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 712532371701.dkr.ecr.eu-west-3.amazonaws.com/probhammer-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer   # EKS crée automatiquement un AWS Load Balancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
