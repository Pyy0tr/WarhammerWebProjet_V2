<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Dark background -->
  <rect width="48" height="48" fill="#0A1621"/>
  <!-- Thin cyan border -->
  <rect width="48" height="48" fill="none" stroke="#2FE0FF" stroke-width="2.5"/>
  <!-- Bold P -->
  <text x="8" y="38" font-family="'Arial Black', 'Impact', sans-serif" font-size="36" font-weight="900" fill="#E6F1FF" letter-spacing="-1">P</text>
  <!-- Cyan accent dot (the apostrophe in PROB'HAMMER) -->
  <circle cx="30" cy="11" r="4" fill="#2FE0FF"/>
</svg>
